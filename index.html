<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GravityBox Interactive</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav>
  <h1>GravityBox Interactive</h1>
  <div>
    <button onclick="show('home')">Home</button>
    <button onclick="show('forums')">Forums</button>
    <button onclick="show('auth')">Login</button>
    <button onclick="logout()">Logout</button>
  </div>
</nav>

<!-- HOME -->
<section id="home" class="page">
  <div class="card">
    <h2>Welcome to GravityBox Interactive</h2>
    <p>Indie sandbox games • Physics systems • Experimental gameplay</p>
  </div>

  <div class="card">
    <h3>Featured Game</h3>
    <p><b>Untitled Sandbox Game</b> — Build, destroy, and experiment with physics freely.</p>
  </div>
</section>

<!-- AUTH -->
<section id="auth" class="page hidden">
  <div class="card">
    <h2>Login</h2>
    <input id="loginUser" placeholder="Username">
    <input id="loginPass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>

    <hr>

    <h2>Sign Up</h2>
    <input id="suUser" placeholder="Username">
    <input id="suPass" type="password" placeholder="Password">
    <button onclick="signup()">Create Account</button>
  </div>
</section>

<!-- FORUMS -->
<section id="forums" class="page hidden">
  <div class="card">
    <h2>Forums</h2>

    <textarea id="postText" placeholder="Write a post..."></textarea>
    <button onclick="postMessage()">Post</button>

    <div id="posts"></div>
  </div>
</section>

<!-- ADMIN PANEL -->
<section id="admin" class="page hidden">
  <div class="card">
    <h2>Admin Panel</h2>
    <p>Welcome, GravityBox 👑</p>

    <button onclick="clearPosts()">Clear All Posts</button>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
