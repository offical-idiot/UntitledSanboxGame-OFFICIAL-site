<!DOCTYPE html>
<html>
<head>
  <title>GravityBox Interactive V2</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<nav>
  <h1 onclick="show('home')">GravityBox</h1>
  <div>
    <button onclick="show('games')">Games</button>
    <button onclick="show('community')">Community</button>
    <button onclick="show('profile')">Profile</button>
    <button onclick="show('auth')">Login</button>
  </div>
</nav>

<!-- HOME -->
<section id="home" class="page">
  <h2>Featured</h2>
  <div class="hero">
    <h1>Untitled Sandbox Game</h1>
    <button onclick="playFeatured()">Play</button>
  </div>
</section>

<!-- GAMES -->
<section id="games" class="page hidden">
  <h2>Games</h2>
  <div id="gamesList" class="grid"></div>
</section>

<!-- GAME VIEW -->
<section id="game" class="page hidden">
  <button onclick="show('games')">← Back</button>
  <h1 id="gameTitle"></h1>
  <p id="gameDesc"></p>
  <button id="playBtn">Play</button>
</section>

<!-- COMMUNITY -->
<section id="community" class="page hidden">
  <h2>Community</h2>
  <textarea id="postText"></textarea>
  <button onclick="post()">Post</button>
  <div id="posts"></div>
</section>

<!-- PROFILE -->
<section id="profile" class="page hidden">
  <h2>Profile</h2>
  <p id="profileEmail"></p>
</section>

<!-- AUTH -->
<section id="auth" class="page hidden">
  <h2>Login</h2>
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
