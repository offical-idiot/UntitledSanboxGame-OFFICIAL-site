<!DOCTYPE html>
<html>
<head>
  <title>GravityBox Interactive v2</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h1 onclick="show('home')">GravityBox</h1>

  <div class="nav-links">
    <button onclick="show('home')">Home</button>
    <button onclick="show('games')">Games</button>
    <button onclick="show('forum')">Community</button>
    <button onclick="show('profile')">Profile</button>
    <button onclick="show('auth')">Login</button>
  </div>
</nav>

<!-- HOME -->
<section id="home" class="page">
  <h2>Featured Game</h2>

  <div class="game-hero">
    <h1>Untitled Sandbox Game</h1>
    <p>Physics sandbox with experimental mechanics</p>
    <button onclick="openGame()">Play Now</button>
  </div>
</section>

<!-- GAMES LIST -->
<section id="games" class="page hidden">
  <h2>Browse Games</h2>
  <div id="gamesList" class="grid"></div>
</section>

<!-- GAME PAGE -->
<section id="gameView" class="page hidden">
  <button onclick="show('games')">← Back</button>

  <div class="game-page">
    <h1 id="gameTitle"></h1>
    <p id="gameDesc"></p>

    <button id="playBtn">Play</button>
  </div>
</section>

<!-- FORUM -->
<section id="forum" class="page hidden">
  <h2>Community</h2>

  <textarea id="postText"></textarea>
  <button onclick="post()">Post</button>

  <div id="posts"></div>
</section>

<!-- PROFILE -->
<section id="profile" class="page hidden">
  <h2>Profile</h2>
  <p id="profileName"></p>
  <p id="profileEmail"></p>
</section>

<!-- AUTH -->
<section id="auth" class="page hidden">
  <h2>Login</h2>
  <input id="email" placeholder="email">
  <input id="password" type="password" placeholder="password">
  <button onclick="signup()">Sign Up</button>
  <button onclick="login()">Login</button>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
